 fetched mail's information in exactly this format: `Result: Alice sent \"Hello\" to Bob`\n- The database file `./database.sqlite` must be created and contain the correct tables and foreign keys.\n\n"])</script><script>self.__next_f.push([1,"a:Ta41,"])</script><script>self.__next_f.push([1,"# Sequelize Bulk Operations and Associations API\n\n## Background\nYou are building a backend service using Express.js, Sequelize, and SQLite. You need to implement bulk data insertion and eager loading of associations, addressing common Sequelize friction points such as hooks not firing on bulk operations and the \"Include unexpected\" error.\n\n## Requirements\n- Create two Sequelize models: `User` (`username`, `password`, `slug`) and `Article` (`title`, `content`).\n- Define an association where a `User` has many `Article`s. You must alias this association as `articles`.\n- Implement a `beforeCreate` hook on the `User` model that:\n  1. Hashes the `password` using SHA-256 (use Node's built-in `crypto` module and output as a hex string).\n  2. Generates a `slug` based on the `username` (convert to lowercase and replace any spaces with hyphens).\n- Implement an Express REST API with the following endpoints:\n  - `POST /users/bulk`: Accepts an array of user objects. Uses Sequelize's `bulkCreate` to insert them. You must ensure the `beforeCreate` hook is triggered for each record.\n  - `POST /users/:id/articles`: Creates a new article associated with the specified user ID.\n  - `GET /users`: Fetches all users and eagerly loads their associated articles. You must query this correctly to avoid the Sequelize \"Include unexpected\" error.\n- Store data in a SQLite database file named `database.sqlite`.\n\n## Implementation Hints\n- Use Express routing and middleware to parse JSON requests.\n- Initialize Sequelize with the `sqlite` dialect and sync the models on server startup.\n- Remember that `bulkCreate` does not run individual model hooks by default; you must configure it via options.\n- When querying with `include`, if an alias (`as`) was defined in the association, you must provide the exact same alias or the model with the alias in the `include` array to avoid errors.\n- Use `crypto.createHash('sha256').update(text).digest('hex')` for hashing.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Start command: node index.js\n- Port: 3000\n- API Endpoints:\n  - `POST /users/bulk`: Accepts a JSON array of users `[{\"username\": \"string\", \"password\": \"string\"}]` and returns `201 Created` with the created user objects (must include `id`, `username`, `password` (hashed), and `slug`).\n  - `POST /users/:id/articles`: Accepts a JSON object `{\"title\": \"string\", \"content\": \"string\"}` and returns `201 Created` with the created article object.\n  - `GET /users`: Returns `200 OK` with a JSON array of all users. Each user object must contain an `articles` property which is an array of their associated articles.\n\n"])</script><script>self.__next_f.push([1,"b:T9de,"])</script><script>self.__next_f.push([1,"# Sequelize Nested Includes and Filtering\n\n## Background\nCreate an Express REST API using Sequelize and SQLite to manage Companies, Departments, and Employees. The API needs a complex query to fetch companies with deeply nested and filtered associations.\n\n## Requirements\n- Define three models: `Company` (string `name`), `Department` (string `name`, string `status`), and `Employee` (string `name`, string `role`).\n- Define associations: A Company has many Departments, and a Department has many Employees.\n- Implement a RESTful API with the following endpoints:\n  - POST `/seed`: Accepts a JSON payload to populate the database. It should clear existing data and insert the provided nested data.\n  - GET `/companies/filtered`: Returns all companies. It must include their departments, but ONLY departments where `status` is `'active'`. Within those active departments, it must include employees, but ONLY employees where `role` is `'senior'`. \n  - **CRITICAL**: Companies without any active departments MUST still be included in the response (with an empty departments array). Active departments without any senior employees MUST still be included in the response (with an empty employees array).\n- Store data in a SQLite database at `./database.sqlite`.\n\n## Implementation Hints\n- Use `Sequelize.sync({ force: true })` during the `/seed` endpoint to reset the database.\n- For the nested filtering, use Sequelize's `include` option with `where` clauses.\n- Pay close attention to the `required` property in your `include` options. By default, adding a `where` clause to an `include` makes it an INNER JOIN, which would filter out parent records that don't have matching children. You need a LEFT OUTER JOIN.\n\n## Acceptance Criteria\n- Project path: /home/user/myproject\n- Start command: npm start\n- Port: 3000\n- API Endpoints:\n  - POST `/seed`: Accepts a JSON array of companies with nested departments and employees. Returns status 200 OK after successfully syncing and seeding the database.\n\n    ```json\n    // Request\n    [\n      {\n        \"name\": string,\n        \"departments\": [\n          {\n            \"name\": string,\n            \"status\": string,\n            \"employees\": [\n              {\n                \"name\": string,\n                \"role\": string\n              }\n            ]\n          }\n        ]\n      }\n    ]\n    ```\n\n  - GET `/companies/filtered`: Returns status 200 and a JSON array of company objects. The JSON structure should match the seed payload, but strictly filtered according to the requirements.\n\n"])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"L3xwx8H25B43LqtMQacbs\",\"c\":[\"\",\"tasks\",\"\"],\"q\":\"\",\"i\":false,\"f\":[[[\"\",{\"children\":[\"tasks\",{\"children\":[\"__PAGE__\",{}]}]},\"$undefined\",\"$undefined\",true],[[\"$\",\"$1\",\"c\",{\"children\":[[[\"$\",\"link\",\"0\",{\"rel\":\"stylesheet\",\"href\":\"/seq
